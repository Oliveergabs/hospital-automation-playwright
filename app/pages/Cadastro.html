<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Paciente</title>

  <!-- CSS separado -->
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/cadastro.css">
  <script src="../app.js?v=2"></script>
</head>
<body>

<div class="container">
  <div class="card">
    <h1>Cadastro</h1>
    <p class="subtitle">Preencha os dados</p>

    <form onsubmit="event.preventDefault(); cadastrar();">

      <div class="form-grid">

        <div>
          <label>Nome completo *</label>
          <input id="nome" placeholder="Digite o nome completo">
        </div>

        <div>
          <label>Email *</label>
          <input id="email" placeholder="Digite o email">
        </div>

        <div>
          <label>Sexo *</label>
          <select id="sexo">
            <option value="">Selecione</option>
            <option value="Masculino">Masculino</option>
            <option value="Feminino">Feminino</option>
          </select>
        </div>

        <div>
          <label>CPF *</label>
          <input id="cpf" placeholder="Digite o CPF">
        </div>

        <div>
          <label>Telefone</label>
          <input id="telefone" placeholder="(00) 00000-0000">
        </div>

        <div>
          <label>Senha *</label>
          <div class="input-group">
            <input id="senha" type="password" placeholder="Crie uma senha">
            <span class="eye" onclick="toggleSenha('senha')">👁️</span>
          </div>
        </div>

      </div>

      <button type="submit">Cadastrar</button>
      <button type="button" class="secondary" onclick="voltarLogin()">Voltar</button>

    </form>

    <p class="hint">
      Já tem conta?
      <a href="../index.html">Fazer login</a>
    </p>

    <p id="msg"></p>
  </div>
</div>

</body>
</html>
