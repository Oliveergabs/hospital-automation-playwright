<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Área do Paciente</title>

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/paciente.css">
  <script src="../app.js?v=2"></script>
</head>

<body class="app-area">

<div class="home-dark">

  <!-- NAVBAR (🔥 IGUAL DA HOME) -->
  <div class="home-navbar">
  <div class="home-logo">🏥 Sistema Hospitalar</div>

  <div class="home-menu">
    <span onclick="irHome()">Início</span>
    <span onclick="irConsulta()">Consulta</span>
    <span onclick="irTelemedicina()">Telemedicina</span>
    <span class="active" onclick="irPaciente()">Paciente</span>
  </div>

  <div class="home-right">
    <span class="home-user">Olá, <strong id="userNome">ADMIN</strong></span>
    <button class="logout-btn" onclick="logout()">Sair</button>
  </div>
</div>

  <!-- CONTEÚDO (🔥 PADRÃO HOME) -->
  <div class="home-content">

    <h1>Área do Paciente</h1>
    <p class="subtitle">Visualize seus dados e altere sua senha</p>

    <div class="paciente-grid">

      <!-- DADOS -->
      <div class="paciente-card">
        <h3>Seus dados</h3>

        <p><strong>Nome:</strong> <span id="nome"></span></p>
        <p><strong>Email:</strong> <span id="email"></span></p>
        <p><strong>CPF:</strong> <span id="cpf"></span></p>
        <p><strong>Sexo:</strong> <span id="sexo"></span></p>
      </div>

      <!-- ALTERAR SENHA -->
      <div class="paciente-card">
        <h3>Alterar senha</h3>

        <label>Senha atual</label>
        <div class="input-group">
          <input id="senhaAtual" type="password">
          <span class="eye" onclick="toggleSenha('senhaAtual')">👁️</span>
        </div>

        <label>Nova senha</label>
        <div class="input-group">
          <input id="novaSenha" type="password">
          <span class="eye" onclick="toggleSenha('novaSenha')">👁️</span>
        </div>

        <button type="button" onclick="alterarSenha()">Atualizar senha</button>

        <p id="msgSenha"></p>
      </div>

    </div>

  </div>

</div>

<script>
  const usuario = JSON.parse(localStorage.getItem("usuarioLogado"));

  if (usuario) {
    document.getElementById("nome").innerText = usuario.nome;
    document.getElementById("email").innerText = usuario.email;
    document.getElementById("cpf").innerText = usuario.cpf;
    document.getElementById("sexo").innerText = usuario.sexo || "Não informado";
  }
</script>

</body>
</html>
